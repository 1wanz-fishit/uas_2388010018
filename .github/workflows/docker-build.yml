name: Docker Build and Push

on:
  # Akan berjalan otomatis setiap ada push ke branch main atau master 
  push:
    branches: [ "main", "master" ]
  # Bisa dijalankan manual lewat tombol di GitHub Actions
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Web Dinamis
      uses: docker/build-push-action@v5
      with:
        context: ./web-dinamis
        push: true
        tags: 1wanzscret/uas-dinamis_2388010018:latest

    - name: Build and push Web Statis
      uses: docker/build-push-action@v5
      with:
        context: ./web-statis
        push: true
        tags: 1wanzscret/uas-static_2388010018:latest
