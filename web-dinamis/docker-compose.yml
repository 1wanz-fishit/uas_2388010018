services:
  web:
    image: 1wanzscret/uas-dinamis_2388010018:latest
    build: .
    ports:
      - "3000:80"
    restart: always
    environment:
      - DB_HOST=db
      - DB_NAME=esport_db
      - DB_USER=root
      - DB_PASS=rootpassword
    volumes:
      - uploads_data:/var/www/html/uploads
    depends_on:
      - db

  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: esport_db
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
  uploads_data:
